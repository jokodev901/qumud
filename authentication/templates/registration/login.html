{% extends base_template %}

{% block content %}
<div class="row align-items-center justify-content-center h-75">
    <div class="col-6 col-xl-3">
        <div id="login-container"
             class="d-flex align-items-center justify-content-center">
                <form autocomplete="off"
                      method="post"
                      action="{% url 'login' %}"
                      class="needs-validation flex-fill d-flex flex-column align-items-center">

                    {% csrf_token %}

                    <div class="d-flex w-100 my-3 align-items-center">
                        <label for="id_username" class="d-flex form-label"></label>
                        <input type="text"
                               id="id_username"
                               name="username"
                               autofocus=""
                               autocapitalize="none"
                               autocomplete="username"
                               maxlength="150"
                               placeholder="Username"
                               class="d-flex w-100 bg-black text-white border-bottom border-secondary no-outline-bottom
                                      custom-text needs-validation
                                      {% if form.errors %}is-invalid{% endif %}"
                               value="{{ form.username.value|default_if_none:'' }}"
                               required>
                    </div>

                    <div class="d-flex w-100 my-3 align-items-center">
                        <label for="id_password" class="d-flex form-label"></label>
                        <input type="password"
                               id="id_password"
                               name="password"
                               autocomplete="current-password"
                               placeholder="Password"
                               class="d-flex w-100 bg-black text-white border-bottom border-secondary no-outline-bottom
                                      custom-text needs-validation
                                      {% if form.errors %}is-invalid{% endif %}"
                               required>
                    </div>

                    <div class="d-flex my-3">
                        <button type="submit" class="btn btn-dark-outline">Login</button>
                    </div>

                    <div class="text-danger small {% if form.errors %} visible {% else %} invisible {% endif %}">
                        Invalid username or password
                    </div>

                </form>
        </div>
    </div>
</div>
{% endblock %}
